<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi641</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .projects {
            display: grid;
            gap: 25px;
        }

        .project-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .project-card h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .project-card p {
            color: #666;
            margin-bottom: 20px;
        }

        .project-card .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tag {
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #555;
        }

        .project-card a {
            display: inline-block;
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: opacity 0.3s ease;
        }

        .project-card a:hover {
            opacity: 0.9;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 60px;
            opacity: 0.8;
        }

        footer a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
            
            .container {
                padding: 40px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="avatar">K</div>
            <h1>Kimi641</h1>
            <p class="subtitle">Developer & Creator</p>
        </header>

        <div class="projects">
            <div class="project-card">
                <h2>📊 Tracker 13F</h2>
                <p>美股13F持仓追踪器 - 实时监控顶级机构投资者（伯克希尔、桥水、ARK等）的SEC持仓报告，洞察聪明钱动向。</p>
                <div class="tech-stack">
                    <span class="tag">Python</span>
                    <span class="tag">SEC API</span>
                    <span class="tag">数据分析</span>
                </div>
                <a href="https://github.com/kimi641/tracker-13f" target="_blank">View on GitHub →</a>
            </div>

            <div class="project-card">
                <h2>🤖 GLM Web Self-Explain</h2>
                <p>GLM-5.2 自述架构交互式页面 - 由 GLM-5.2 自己编写的自我解释网页，展示大语言模型的架构与原理。</p>
                <div class="tech-stack">
                    <span class="tag">HTML/CSS/JS</span>
                    <span class="tag">LLM</span>
                    <span class="tag">交互式</span>
                </div>
                <a href="/glm/">查看演示 →</a>
                <a href="https://github.com/kimi641/glm-web-self-explain" target="_blank" style="background: #666; margin-left: 8px;">GitHub</a>
            </div>
        </div>

        <footer>
            <p>
                <a href="https://github.com/kimi641" target="_blank">GitHub</a>
                <a href="/archive">旧博客归档</a>
            </p>
            <p style="margin-top: 15px;">© 2024 Kimi641</p>
        </footer>
    </div>
</body>
</html>
